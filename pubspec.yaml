  uses-material-design: true
  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - google_fonts/
    - assets/languages/
    - assets/animations/
    - assets/sound/
    - assets/images/lower_pattern_red.png
    - assets/images/upper_pattern_red.png
    - assets/images/0.75x/lower_pattern.png
